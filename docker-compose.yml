services:
  postgres:
    image: postgres:16-alpine
    container_name: rlm-forge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scout}
    ports:
      - "5432:5432"
    volumes:
      - scout_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scout}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: rlm-forge-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rlm-forge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  model-service:
    build:
      context: ./apps/model-service
    container_name: rlm-forge-model-service
    env_file:
      - .env
    ports:
      - "8100:8100"

  rlm-runtime:
    build:
      context: ./apps/rlm-runtime
    container_name: rlm-forge-runtime
    env_file:
      - .env
    environment:
      MODEL_SERVICE_URL: http://model-service:8100
    ports:
      - "8787:8787"
    depends_on:
      model-service:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rlm-forge-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scout?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/scout
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MODEL_SERVICE_URL: http://model-service:8100
      RLM_RUNTIME_URL: http://rlm-runtime:8787
      AGENT_EXECUTOR_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      model-service:
        condition: service_started
      rlm-runtime:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: rlm-forge-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scout?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/scout
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MODEL_SERVICE_URL: http://model-service:8100
      RLM_RUNTIME_URL: http://rlm-runtime:8787
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      model-service:
        condition: service_started
      rlm-runtime:
        condition: service_started
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rlm-forge-web
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  scout_postgres_data:
  qdrant_data:
